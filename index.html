<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Simple Form</title>
	<style>
		body{font-family:Arial,Helvetica,sans-serif;padding:20px}
		form{max-width:480px;margin:0 auto}
		label{display:block;margin:12px 0 4px}
		input,textarea,select{width:100%;padding:8px;box-sizing:border-box}
		.row{display:flex;gap:8px}
		.row > *{flex:1}
	</style>
</head>
<body>
	<h1>Contact Form</h1>
	<form action="#" method="post">
		<label for="fullname">Full name</label>
		<input id="fullname" name="fullname" type="text" required>

		<label for="email">Email</label>
		<input id="email" name="email" type="email" required>

		<div class="row">
			<div>
				<label for="phone">Phone</label>
				<input id="phone" name="phone" type="tel">
			</div>
			<div>
				<label for="age">Age</label>
				<input id="age" name="age" type="number" min="0" max="120">
			</div>
		</div>

		<label for="subject">Subject</label>
		<select id="subject" name="subject">
			<option value="general">General</option>
			<option value="support">Support</option>
			<option value="sales">Sales</option>
		</select>

		<label>Preferred contact</label>
		<label><input type="radio" name="contact" value="email" checked> Email</label>
		<label><input type="radio" name="contact" value="phone"> Phone</label>

		<label><input type="checkbox" name="subscribe"> Subscribe to newsletter</label>

		<label for="message">Message</label>
		<textarea id="message" name="message" rows="6"></textarea>

		<div style="margin-top:12px">
			<button type="submit">Send</button>
			<button type="reset" style="margin-left:8px">Reset</button>
		</div>
	</form>
</body>
</html>
